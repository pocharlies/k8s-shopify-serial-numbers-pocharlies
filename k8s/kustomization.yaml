apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skirmshop

resources:
  - https://github.com/pocharlies/k8s-shopify-framework-pocharlies.git//base?ref=deploy/prod
  - pvc.yaml

namePrefix: serial-

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: serial-numbers

images:
  - name: shopify-app
    newName: harbor.lan.e-dani.com/homelab/skirmshop-serial-numbers
    newTag: v2026.05.25

patches:
  - target: { kind: Deployment, name: app }
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        template:
          spec:
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: serial-data
            containers:
              - name: app
                env:
                  - { name: SHOPIFY_APP_URL, value: "https://skirmshop.e-dani.com/sn" }
                  - { name: SCOPES, value: "read_customers,read_products,write_products,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_orders,read_all_orders,write_orders" }
                  - { name: DATABASE_URL, value: "file:/data/dev.sqlite" }
                envFrom:
                  - secretRef: { name: serial-secrets }
                volumeMounts:
                  - { name: data, mountPath: /data }
  - target: { group: apps, version: v1, kind: Deployment, name: app }
    patch: |-
      - op: add
        path: /spec/strategy
        value:
          type: Recreate
      - op: replace
        path: /spec/template/spec/nodeSelector
        value:
          kubernetes.io/arch: amd64
      - op: replace
        path: /spec/template/spec/tolerations
        value: []
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /sn/healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
  - target: { group: traefik.io, version: v1alpha1, kind: IngressRoute, name: app }
    patch: |-
      - op: replace
        path: /spec/routes/0/match
        value: Host(`skirmshop.e-dani.com`) && PathPrefix(`/sn`)
